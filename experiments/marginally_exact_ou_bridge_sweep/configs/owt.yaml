dataset: owt
seed: 1
output_root: outputs/experiments/marginally_exact_ou_bridge_sweep

checkpoint:
  path: null
  dir: checkpoints/flm
  download: auto
  folder_url: null

generation:
  text_length: 1024
  target_samples: 1024
  eval_batch_size: 8

metrics:
  compute_generative_perplexity: false
  compute_mauve: false
  ppl_batch_size: 8
  mauve_batch_size: 2

sweep:
  include_ode: true
  steps: powers_of_two
  temperatures: [0.7, 0.9, 1.0]
  nucleus_ps: [0.95, 1.0]

runtime:
  gpus: "0,1,2,3"
  gpu_scheduling: shards
  jobs_per_gpu: 1
  python: null
